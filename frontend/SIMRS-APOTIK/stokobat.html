      <!-- Header -->

        <h1 class="text-2xl font-semibold text-gray-800">Stok Obat</h1>
        <div class="flex items-center space-x-4 text-sm text-gray-700">
          <span>03 April 2025</span>
          <!-- icon notifikasi -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"class="w-6 h-6 text-blue-900">

            <div class="flex items-center mb-3 space-x-3">
              <img src="assets/img/download (3).jpg"
                  alt="Profile" class="object-cover w-12 h-12 rounded-full" />
              <div>
                <p class="text-sm font-semibold text-gray-800">Mr. Roc</p>
                <p class="text-xs text-gray-500">Petugas Apotek</p>

      <!-- Search -->
      <div class="flex justify-end mb-4 space-x-2">
        <input type="text" placeholder="Cari Obat..." class="w-1/3 px-4 py-2 border rounded-md" />
        <select class="px-4 py-2 border rounded-md">
          <option>Stok (Terbanyak)</option>
          <option>Stok (Tersedikit)</option>
          <option>Kadaluwarsa</option>
        </select>
      </div>
     
      <!-- Table -->
      <div class="overflow-auto">
        <table class="min-w-full overflow-hidden text-sm border border-collapse rounded-lg">
          <thead class="text-white bg-blue-900">
            <tr>
              <th class="px-4 py-2 border">Kode</th>
              <th class="px-4 py-2 border">Nama Obat</th>
              <th class="px-4 py-2 border">Kategori</th>
              <th class="px-4 py-2 border">Bentuk Satuan</th>
              <th class="px-4 py-2 border">Stok</th>
              <th class="px-4 py-2 border">Harga Jual</th>
              <th class="px-4 py-2 border">Kedaluwarsa</th>
            </tr>
          </thead>
          <tbody>
            <!-- Ulangi baris berikut ini dengan data dinamis -->
            <tr>
              <td class="px-4 py-2 border">PAR001</td>
              <td class="px-4 py-2 border">Paracetamol</td>
              <td class="px-4 py-2 border">Analgesik</td>
              <td class="px-4 py-2 border">Tablet</td>
              <td class="px-4 py-2 border">500</td>
              <td class="px-4 py-2 border">Rp. 5.000</td>
              <td class="px-4 py-2 border">
                <div class="relative">
                  <div class="flex items-center justify-between space-x-2">
                    <span>2027-08-15</span>
                    <button id="dropdownButton1" class="text-lg text-blue-600 hover:underline focus:outline-none">⋮</button>
                  </div>
                  <div id="dropdownMenu1" class="absolute right-0 z-10 hidden w-40 mt-2 bg-white border rounded-md shadow-lg">
                    <button class="block w-full px-4 py-2 text-sm text-left hover:bg-gray-100">Ubah Stok</button>
                    <button class="block w-full px-4 py-2 text-sm text-left hover:bg-gray-100">Ubah Harga</button>
                    <button class="block w-full px-4 py-2 text-sm text-left hover:bg-gray-100">Ubah Kedaluwarsa</button>
                    <button class="block w-full px-4 py-2 text-sm text-left text-red-600 hover:bg-red-50">Hapus Obat</button>
                  </div>
                </div>
              </td>
            </tr>
            <!-- Tambah data lain di sini -->
          </tbody>
          
          <script>
            // JavaScript untuk menangani dropdown
            const dropdownButton1 = document.getElementById('dropdownButton1');
            const dropdownMenu1 = document.getElementById('dropdownMenu1');
          
            dropdownButton1.addEventListener('click', (event) => {
              event.stopPropagation(); // Mencegah event bubbling
              dropdownMenu1.classList.toggle('hidden');
            });
          
            document.addEventListener('click', () => {
              dropdownMenu1.classList.add('hidden');
            });
          </script>
