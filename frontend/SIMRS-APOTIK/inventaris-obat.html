<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apoteker - Stok Obat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="flex flex-col items-center w-24 py-4 text-white bg-blue-900">
        <img src="assets/img/logo-rsi-banjarmasin.png" alt="Logo Rumah Sakit" class="w-16 h-16 mb-8 rounded-full shadow-lg">
        <nav class="space-y-4">
          <a href="antrean.html" class="flex flex-col items-center text-sm text-white-700 hover:text-blue-800">

                   stroke-width="1.5" stroke="currentColor" class="w-6 h-6">

          <a href="stokobat.html" class="flex flex-col items-center text-sm text-white-700 hover:text-blue-800">
            <div class="p-2 mb-1 text-blue-900 bg-white rounded-full shadow">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                   viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                   class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 0 1-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504-1.125-1.125-1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0 1 12 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504-1.125-1.125-1.125M2.25 5.625v1.5c0 .621.504-1.125 1.125-1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504-1.125 1.125-1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504-1.125-1.125-1.125m-17.25 0h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504-1.125 1.125-1.125M12 10.875v-1.5m0 1.5c0 .621-.504-1.125-1.125-1.125M12 10.875c0 .621.504-1.125 1.125-1.125m-2.25 0c.621 0 1.125.504 1.125 1.125M13.125 12h7.5m-7.5 0c-.621 0-1.125.504-1.125 1.125M20.625 12c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504-1.125-1.125-1.125m-17.25 0h7.5M12 14.625v-1.5m0 1.5c0 .621-.504-1.125-1.125-1.125M12 14.625c0 .621.504-1.125 1.125-1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m0 1.5v-1.5m0 0c0-.621.504-1.125 1.125-1.125m0 0h7.5" />

            Stok Obat

          <a href="riwayat.html" class="flex flex-col items-center text-sm text-white-700 hover:text-blue-800">
            <div class="p-2 mb-1 text-blue-900 bg-white rounded-full">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                   viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
                   class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
              </svg>
            </div>
            Riwayat
          </a>
        </nav>
      </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 bg-white rounded shadow-md">
      <!-- Header -->
      <div class="relative flex items-center justify-between px-4 mb-6">
        <h1 class="text-2xl font-semibold text-gray-800">Stok Obat</h1>
        <div class="flex items-center space-x-4 text-sm text-gray-700">
          <span>03 April 2025</span>
          <!-- icon notifikasi -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"class="w-6 h-6 text-blue-900">            
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
          </svg> 
          <!-- icon user -->  
          <button id="profileBtn" class="flex items-center space-x-2 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-blue-900">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button> 
          <!-- Pop-up -->
          <div id="profilePopup" class="absolute z-50 hidden w-64 p-4 bg-white border shadow-lg top-10 right-4 rounded-xl">
            <div class="flex items-center mb-3 space-x-3">
              <img src="assets/img/download (3).jpg"
                  alt="Profile" class="object-cover w-12 h-12 rounded-full" />
              <div>
                <p class="text-base font-semibold text-gray-800">Violet Evergarden</p>
                <p class="text-xs text-gray-500">Admin Apotek</p>
              </div>
            </div>
            <hr class="mb-3" />
            <button class="flex items-center mb-3 space-x-2 text-sm text-gray-800 hover:underline w-full px-2 py-2 rounded transition">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <span>Profil Saya</span>
            </button>
            <button class="w-full py-2 text-sm text-white bg-blue-900 rounded-md hover:bg-blue-800">Keluar</button>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="flex justify-end mb-4 space-x-2">
        <!-- Input pencarian obat -->
        <input 
          type="text" 
          placeholder="Cari Obat..." 
          class="w-1/4 px-3 py-1 text-sm border border-gray-300 rounded"
        />

        <!-- Dropdown filter -->
        <select 
          class="w-1/4 px-3 py-1 text-sm border border-gray-300 rounded"
        >
          <option>Stok (Terbanyak)</option>
          <option>Stok (Tersedikit)</option>
          <option>Kadaluwarsa</option>
        </select>

        <!-- Tombol tambah obat -->
        <button 
          class="w-1/4 px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-100 text-gray-800"
          onclick="openModal('tambahObatModal')"
        >
          + Tambahkan Obat
        </button>
      </div>
     
      <!-- Table -->
      <div class="overflow-auto">
        <table class="min-w-full overflow-hidden text-sm border border-collapse rounded-lg">
          <thead class="text-white bg-blue-900">
            <tr>
              <th class="px-4 py-2 border">Kode</th>
              <th class="px-4 py-2 border">Nama Obat</th>
              <th class="px-4 py-2 border">Kategori</th>
              <th class="px-4 py-2 border">Bentuk Satuan</th>
              <th class="px-4 py-2 border">Stok</th>
              <th class="px-4 py-2 border">Harga Jual</th>
              <th class="px-4 py-2 border">Kedaluwarsa</th>
              <th class="px-4 py-2 border"></th> 
            </tr>
          </thead>
          <tbody>
            <tr id="row1">
              <td class="px-4 py-2 border">PAR001</td>
              <td class="px-4 py-2 border">Paracetamol</td>
              <td class="px-4 py-2 border">Analgesik</td>
              <td class="px-4 py-2 border">Tablet</td>
              <td id="stok1" class="px-4 py-2 border">500</td>
              <td id="harga1" class="px-4 py-2 border">Rp. 5.000</td>
              <td id="kedaluwarsa1" class="px-4 py-2 border">2027-08-15</td>
              <td class="px-4 py-2 border text-center">
                <button id="dropdownButton1" class="text-lg text-blue-600 hover:underline focus:outline-none">⋮</button>
                <div id="dropdownMenu1" class="absolute right-0 z-10 hidden w-48 mt-2 bg-white border rounded-md shadow-lg">
                  <ul class="text-sm text-gray-700">
                    <li>
                      <button id="ubahStokBtn" class="flex items-center w-full px-4 py-2 hover:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h11M9 21V3m0 18l-6-6m6 6l6-6" />
                        </svg>
                        Ubah Stok
                      </button>
                    </li>
                    <li>
                      <button id="ubahHargaBtn" class="flex items-center w-full px-4 py-2 hover:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zm0 0V4m0 8v4" />
                        </svg>
                        Ubah Harga
                      </button>
                    </li>
                    <li>
                      <button id="ubahKedaluwarsaBtn" class="flex items-center w-full px-4 py-2 hover:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-6 8h6m-6 4h6m-6 4h6m-6-8v8m6-8v8" />
                        </svg>
                        Ubah Kedaluwarsa
                      </button>
                    </li>
                    <li>
                      <button id="hapusObatBtn" class="flex items-center w-full px-4 py-2 text-red-600 hover:bg-red-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                        Hapus Obat
                      </button>
                    </li>
                  </ul>
                </div>
              </td>
            </tr>
          </tbody>
          
          <script>
            // Dropdown logic
            const dropdownButton1 = document.getElementById('dropdownButton1');
            const dropdownMenu1 = document.getElementById('dropdownMenu1');

            dropdownButton1.addEventListener('click', (event) => {
              event.stopPropagation();
              dropdownMenu1.classList.toggle('hidden');
            });

            document.addEventListener('click', () => {
              dropdownMenu1.classList.add('hidden');
            });

            // Modal logic
            const openModal = (modalId) => {
              document.getElementById(modalId).classList.remove('hidden');
            };

            const closeModal = (modalId) => {
              document.getElementById(modalId).classList.add('hidden');
            };

            document.getElementById('ubahStokBtn').addEventListener('click', () => openModal('ubahStokModal'));
            document.getElementById('ubahHargaBtn').addEventListener('click', () => openModal('ubahHargaModal'));
            document.getElementById('ubahKedaluwarsaBtn').addEventListener('click', () => openModal('ubahKedaluwarsaModal'));
            document.getElementById('hapusObatBtn').addEventListener('click', () => openModal('hapusObatModal'));

            // Profile popup logic
            const profileBtn = document.getElementById('profileBtn');
            const profilePopup = document.getElementById('profilePopup');

            profileBtn.addEventListener('click', function (e) {
              e.stopPropagation();
              profilePopup.classList.toggle('hidden');
            });

            document.addEventListener('click', function (e) {
              if (!profilePopup.contains(e.target) && e.target !== profileBtn) {
                profilePopup.classList.add('hidden');
              }
            });
          </script>

          <!-- Dialog Modals -->
          <div id="ubahStokModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white p-6 rounded-md shadow-lg">
              <h2 class="text-lg font-semibold mb-4">Ubah Stok Obat</h2>
              <label class="block mb-2">Stok Sebelumnya:</label>
              <input type="text" class="w-full px-4 py-2 mb-4 border rounded-md bg-gray-100 cursor-not-allowed" value="50" readonly />
              <label class="block mb-2">Stok Terbaru:</label>
              <input type="text" class="w-full px-4 py-2 mb-4 border rounded-md" />
              <div class="flex justify-end space-x-2">
                <button class="px-4 py-2 border rounded-md" onclick="closeModal('ubahStokModal')">Batal</button>
                <button class="px-4 py-2 text-white bg-blue-600 rounded-md">Perbarui</button>
              </div>
            </div>
          </div>

          <!-- Modal Ubah Harga -->
          <div id="ubahHargaModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white p-6 rounded-md shadow-lg">
              <h2 class="text-lg font-semibold mb-4">Ubah Harga Obat</h2>
              <label class="block mb-2">Harga Sebelumnya:</label>
              <input type="text" class="w-full px-4 py-2 mb-4 border rounded-md bg-gray-100 cursor-not-allowed" value="5000" readonly />
              <label class="block mb-2">Harga Terbaru:</label>
              <input type="text" class="w-full px-4 py-2 mb-4 border rounded-md" />
              <div class="flex justify-end space-x-2">
                <button class="px-4 py-2 border rounded-md" onclick="closeModal('ubahHargaModal')">Batal</button>
                <button class="px-4 py-2 text-white bg-blue-600 rounded-md">Perbarui</button>
              </div>
            </div>
          </div>

          <!-- Modal Ubah Kedaluwarsa -->
          <div id="ubahKedaluwarsaModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white p-6 rounded-md shadow-lg">
              <h2 class="text-lg font-semibold mb-4">Ubah Kedaluwarsa Obat</h2>
              <label class="block mb-2">Tanggal Sebelumnya:</label>
              <input type="date" class="w-full px-4 py-2 mb-4 border rounded-md bg-gray-100 cursor-not-allowed" value="2027-08-15" readonly />
              <label class="block mb-2">Tanggal Terbaru:</label>
              <input type="date" class="w-full px-4 py-2 mb-4 border rounded-md" />
              <div class="flex justify-end space-x-2">
                <button class="px-4 py-2 border rounded-md" onclick="closeModal('ubahKedaluwarsaModal')">Batal</button>
                <button class="px-4 py-2 text-white bg-blue-600 rounded-md">Perbarui</button>
              </div>
            </div>
          </div>

          <!-- Modal Hapus Obat -->
          <div id="hapusObatModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white p-6 rounded-md shadow-lg">
              <h2 class="text-lg font-semibold mb-4">Hapus Obat?</h2>
              <div class="flex justify-end space-x-2">
                <button class="px-4 py-2 border rounded-md" onclick="closeModal('hapusObatModal')">Batal</button>
                <button class="px-4 py-2 text-white bg-red-600 rounded-md">Hapus</button>
              </div>
            </div>
          </div>

          <!-- Modal Tambahkan Obat -->
          <div id="tambahObatModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
            <div class="bg-white p-6 rounded-md shadow-lg w-96 relative">
              <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold">Tambahkan Obat</h2>
                <button onclick="closeModal('tambahObatModal')" class="text-gray-500 hover:text-gray-700 text-xl">&times;</button>
              </div>
              <form>
                <div class="mb-2">
                  <label class="block text-sm mb-1">Nama Obat:</label>
                  <input type="text" class="w-full px-2 py-1 border rounded" />
                </div>
                <div class="flex gap-2 mb-2">
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Kode Obat:</label>
                    <input type="text" class="w-full px-2 py-1 border rounded" />
                  </div>
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Kategori Obat:</label>
                    <select class="w-full px-2 py-1 border rounded">
                      <option>Analgesik</option>
                      <option>Antibiotik</option>
                      <option>Vitamin</option>
                    </select>
                  </div>
                </div>
                <div class="flex gap-2 mb-2">
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Bentuk Satuan:</label>
                    <select class="w-full px-2 py-1 border rounded">
                      <option>Tablet</option>
                      <option>Kapsul</option>
                      <option>Cair</option>
                    </select>
                  </div>
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Stok Obat:</label>
                    <input type="number" class="w-full px-2 py-1 border rounded" />
                  </div>
                </div>
                <div class="flex gap-2 mb-4">
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Harga Jual Obat:</label>
                    <input type="text" class="w-full px-2 py-1 border rounded" />
                  </div>
                  <div class="w-1/2">
                    <label class="block text-sm mb-1">Tanggal kedaluwarsa:</label>
                    <input type="date" class="w-full px-2 py-1 border rounded" />
                  </div>
                </div>
                <div class="flex justify-end">
                  <button type="button" class="px-4 py-2 text-white bg-blue-900 rounded" onclick="closeModal('tambahObatModal')">Tambahkan</button>
                </div>
              </form>
            </div>
          </div>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
