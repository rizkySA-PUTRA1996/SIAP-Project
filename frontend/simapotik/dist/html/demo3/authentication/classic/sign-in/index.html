 <body class="antialiased flex h-full text-base text-gray-700 dark:bg-coal-500" style="background-color: #D9D9D9;">
  <script>
   const defaultThemeMode = 'light'; // light|dark|system
		let themeMode;

		if ( document.documentElement ) {
			if ( localStorage.getItem('theme')) {
					themeMode = localStorage.getItem('theme');
			} else if ( document.documentElement.hasAttribute('data-theme-mode')) {
				themeMode = document.documentElement.getAttribute('data-theme-mode');
			} else {
				themeMode = defaultThemeMode;
			}

			if (themeMode === 'system') {
				themeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
			}

			document.documentElement.classList.add(themeMode);
		}
  </script>
  <style>
    .btn-login{
      background-color: #113F67; /* Warna biru untuk tombol login */
      color: white; /* Warna teks putih */
      border-radius: 5px; /* Sudut membulat */
      padding: 10px 20px; /* Padding dalam tombol */
      font-size: 16px; /* Ukuran font */
      cursor: pointer; /* Kursor tangan saat hover */
      transition: background-color 0.3s ease; /* Transisi halus saat hover */
    }
    .page-bg {
      position: relative;
      background-image: url('assets/media/images/2600x1200/bg-apotik.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      width: 100%;
      min-height: 100vh; /* Penting agar gambar penuh tinggi layar */
    }
    .page-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4); /* efek gelap */
      z-index: 1;
    }
    .page-bg > * {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body class="h-full m-0 p-0">
  <div class="page-bg flex items-center justify-center">
    <div class="card max-w-[370px] w-full">
      <form action="#" class="card-body flex flex-col gap-5 p-10" id="sign_in_form" method="get">
        <div class="flex justify-center mb-5">
          <img alt="Logo" src="assets/media/app/logo-rsi-banjarmasin.png" class="h-20"/>
        </div>
        <div class="flex flex-col gap-1">
          <label class="form-label font-normal text-white">Email</label>
          <input class="input" placeholder="Masukkan email anda" type="text"/>
        </div>
        <div class="flex flex-col gap-1">
          <label class="form-label font-normal text-white">Kata Sandi</label>
          <div class="input" data-toggle-password="true">
            <input name="user_password" placeholder="Masukkan Kata Sandi" type="password"/>
            <button class="btn btn-icon" type="button">
              <i class="ki-filled ki-eye text-gray-500"></i>
              <i class="ki-filled ki-eye-slash text-gray-500 hidden"></i>
            </button>
          </div>
        </div>
        <label class="checkbox-group text-white">
          <input class="checkbox checkbox-sm" type="checkbox" value="1"/>
          <span class="checkbox-label">Ingat Saya</span>
        </label>
        <button class="btn-login">Masuk</button>
      </form>
    </div>
  </div>
</body>
